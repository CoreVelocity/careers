
<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CoreV | Recruiting</title>
<script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@2.38.3/lib/msal-browser.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=Archivo:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  /* CoreV approved colors */
  --navy:#0C1B33; --dark:#0A0F1C; --lightblue:#7ED0FA; --hyper:#2013D6; --electric:#4A8CF8;
  --gray:#808285; --silver:#C7C8CA; --pearl:#EFF0F1; --coral:#F04E23; --aqua:#35D3B0; --white:#fff;
  --shadow:0 1px 2px rgba(12,27,51,.05),0 8px 24px -12px rgba(12,27,51,.2);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--pearl);color:var(--navy);font-family:"Archivo",sans-serif;font-size:14px;line-height:1.5}
.hidden{display:none!important}
h1,h2,h3,.disp{font-family:"Barlow Condensed",sans-serif;font-weight:700}
.btn{cursor:pointer;border:none;border-radius:8px;font-family:inherit;font-weight:700;font-size:13.5px;padding:10px 18px;transition:opacity .15s;display:inline-flex;align-items:center;gap:7px}
.btn:hover{opacity:.9}
.btn.p{background:var(--hyper);color:#fff}
.btn.g{background:#fff;color:var(--navy);border:1px solid var(--silver)}
.btn.navy{background:var(--navy);color:#fff}
.btn.danger{background:#FBE9E4;color:var(--coral)}
.btn.sm{padding:6px 12px;font-size:12.5px}
input,select,textarea{font-family:inherit;font-size:14px;color:var(--navy);background:#fff;border:1px solid var(--silver);border-radius:8px;padding:9px 11px;outline:none;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--electric);box-shadow:0 0 0 3px rgba(74,140,248,.18)}
label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--gray);margin:12px 0 5px;font-weight:700}
.card{background:#fff;border:1px solid var(--silver);border-radius:12px;box-shadow:var(--shadow)}
.badge{display:inline-block;font-size:11px;font-weight:700;border-radius:14px;padding:2px 9px;white-space:nowrap}
/* ---- login ---- */
#loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--navy);
  background-image:radial-gradient(circle at 30% 20%, rgba(74,140,248,.18), transparent 45%),radial-gradient(circle at 80% 90%, rgba(32,19,214,.25), transparent 40%)}
.loginCard{background:#fff;border-radius:16px;padding:38px 36px;max-width:420px;width:92%;text-align:center;box-shadow:0 30px 60px -20px rgba(0,0,0,.5)}
.loginCard img{height:56px;margin-bottom:18px}
.loginCard h1{font-size:28px;letter-spacing:-.3px}
.loginCard p{color:var(--gray);font-size:13px;margin:8px 0 22px}
.msbtn{width:100%;justify-content:center;background:var(--navy);color:#fff;padding:13px}
#loginError{display:none;margin-top:14px;background:#FBE9E4;color:var(--coral);border-radius:8px;padding:10px;font-size:12.5px;text-align:left}
.loginfoot{margin-top:18px;font-size:11.5px;color:var(--gray)}
/* ---- app ---- */
#appRoot{display:none}
#appRoot.ready{display:block}
.topbar{background:#fff;border-bottom:1px solid var(--silver);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;gap:14px;position:sticky;top:0;z-index:10}
.topbar img{height:38px}
.topbar .who{font-size:12.5px;color:var(--gray)}
.syncbar{font-size:11.5px;font-weight:700;border-radius:14px;padding:3px 11px;cursor:pointer}
.syncbar.connected{background:#E4F7F1;color:#0B7A5E}
.syncbar.syncing{background:#EEF4FE;color:var(--hyper)}
.syncbar.error{background:#FBE9E4;color:var(--coral)}
.hero{background:var(--navy);color:#fff;padding:22px 24px}
.hero .in{max-width:1080px;margin:0 auto}
.hero .eyebrow{font-family:"Barlow Condensed";font-size:12px;letter-spacing:.2em;color:var(--lightblue);text-transform:uppercase;font-weight:700}
.hero h1{font-size:34px;line-height:1.05;margin-top:4px}
.main{max-width:1080px;margin:0 auto;padding:22px 24px 70px}
.toolrow{display:flex;flex-wrap:wrap;gap:8px;align-items:center;justify-content:space-between;margin-bottom:16px}
#syncBanner{display:none;background:#FFF6E8;border:1px solid #EAD9B0;color:#8a6d1a;border-radius:10px;padding:10px 14px;font-size:12.5px;margin-bottom:14px}
.cand{margin-bottom:12px;overflow:hidden}
.cand .head{display:flex;align-items:center;gap:14px;padding:13px 16px;cursor:pointer}
.cand .rank{font-family:"Barlow Condensed";font-size:20px;color:var(--silver);width:28px}
.cand .nm{font-weight:700;font-size:15px}
.cand .chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:5px}
.chip{font-size:11px;background:var(--pearl);border-radius:5px;padding:2px 7px}
.cand .tot{font-family:"Barlow Condensed";font-size:30px;line-height:1;text-align:right}
.cand .bandlbl{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;text-align:right}
.cand .body{border-top:1px solid var(--pearl);padding:14px 16px 18px;font-size:13.5px;display:none}
.cand.open .body{display:block}
.kv{display:grid;grid-template-columns:1fr 1fr;gap:3px 20px;margin-bottom:10px;font-size:13px}
.scrim{position:fixed;inset:0;background:rgba(10,15,28,.5);display:none;align-items:flex-start;justify-content:center;padding:40px 16px;z-index:50;overflow:auto}
.scrim.show{display:flex}
.modal{background:#fff;border-radius:14px;width:100%;max-width:620px;box-shadow:0 30px 60px -20px rgba(0,0,0,.4)}
.modal h3{font-size:22px;padding:20px 22px 0}
.modal .mbody{padding:16px 22px}
.modal .mfoot{padding:13px 22px;border-top:1px solid var(--pearl);display:flex;justify-content:flex-end;gap:10px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:0 14px}
#flash{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;border-radius:10px;padding:10px 18px;font-size:13px;display:none;z-index:99}
.empty{padding:44px;text-align:center;color:var(--gray)}
.newdot{background:var(--coral);color:#fff;font-size:10px;border-radius:4px;padding:2px 6px;font-weight:700;margin-left:6px;vertical-align:middle}
@media(max-width:640px){.g2{grid-template-columns:1fr}.kv{grid-template-columns:1fr}}
</style>

/* ============ Microsoft auth + OneDrive shared sync (mirrors the HR portal) ============ */
let msalInstance=null,msalAccount=null,syncTimer=null,_uploadInFlight=false,_uploadQueued=false,_pollStarted=false,lastSyncAt=null,lastUpdatedBy="",_fileRef=null,_accessError=false;
const _fileName=(ONEDRIVE_CONFIG.filePath.split("/").pop()||"corev-recruiting.json").toLowerCase();

function setSync(status,text){const bar=$("#syncBar");if(!bar)return;bar.className="syncbar "+status;$("#syncText").textContent=text||status;}
function fmtTime(d){try{return new Date(d).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});}catch(e){return"";}}
function syncedText(){let t="Shared";if(lastUpdatedBy)t+=" · by "+lastUpdatedBy;if(lastSyncAt)t+=" "+fmtTime(lastSyncAt);return t;}
function updateSyncBanner(){const b=$("#syncBanner");if(!b)return;
  if(_accessError){b.style.display="block";b.innerHTML="⚠ Your account can’t reach the shared team drive ("+ONEDRIVE_CONFIG.sharedDriveUser+"). Changes are saved on this device only. Confirm the <b>OXEFIT</b> folder is shared with you, then click the sync status to retry.";}
  else b.style.display="none";}
function scheduleSync(){if(!msalAccount)return;clearTimeout(syncTimer);syncTimer=setTimeout(uploadToOneDrive,2000);}

async function initMsal(){
  if(typeof msal==="undefined"||!ONEDRIVE_CONFIG.clientId)return null;
  if(!msalInstance){
    msalInstance=new msal.PublicClientApplication({auth:{clientId:ONEDRIVE_CONFIG.clientId,authority:ONEDRIVE_CONFIG.authority,redirectUri:ONEDRIVE_CONFIG.redirectUri},cache:{cacheLocation:"localStorage"}});
    await msalInstance.initialize();
  }
  let rr=null;try{rr=await msalInstance.handleRedirectPromise();}catch(_){}
  if(rr&&rr.account){msalAccount=rr.account;return rr.account;}
  const a=msalInstance.getAllAccounts();if(a.length){msalAccount=a[0];return a[0];}
  return null;
}
async function handleMicrosoftLogin(){
  const btn=$("#msBtn");$("#loginError").style.display="none";
  if(!msalInstance){try{await initMsal();}catch(_){}}
  if(!msalInstance){showLoginError("Microsoft sign-in isn't configured (MSAL failed to load).");return;}
  const lbl=btn.querySelector("span");const o=lbl.textContent;btn.disabled=true;lbl.textContent="Redirecting…";
  try{
    try{Object.keys(sessionStorage).filter(k=>k.startsWith("msal.")&&k.includes("interaction.status")).forEach(k=>sessionStorage.removeItem(k));}catch(_){}
    await msalInstance.loginRedirect({scopes:ONEDRIVE_CONFIG.scopes,prompt:"select_account"});
  }catch(e){const msg=(e&&(e.errorMessage||e.message))||"Sign-in failed";
    showLoginError(msg+" — If this mentions redirect URI, add this exact URL as a SPA redirect URI in the Azure app: "+ONEDRIVE_CONFIG.redirectUri);
    btn.disabled=false;lbl.textContent=o;}
}
function showLoginError(m){const e=$("#loginError");e.textContent=m;e.style.display="block";}

function authorize(account){
  currentEmail=(account.username||"").toLowerCase();
  currentUser=account.name||account.username||currentEmail;
  role=ADMIN_MAP[currentEmail]||"";

}
async function signOutSilently(){try{if(msalInstance&&msalAccount){await msalInstance.logoutRedirect({account:msalAccount,postLogoutRedirectUri:window.location.href});}}catch(_){}}
async function signOut(){await signOutSilently();location.reload();}

async function getAccessToken(){
  const req={scopes:ONEDRIVE_CONFIG.scopes,account:msalAccount};
  try{const r=await msalInstance.acquireTokenSilent(req);return r.accessToken;}
  catch(e){await msalInstance.acquireTokenRedirect(req);throw e;}
}
function driveRootUrl(){const upn=ONEDRIVE_CONFIG.sharedDriveUser;
  if(upn)return `https://graph.microsoft.com/v1.0/users/${encodeURIComponent(upn)}/drive/root:${ONEDRIVE_CONFIG.filePath}:/content`;
  return `https://graph.microsoft.com/v1.0/me/drive/root:${ONEDRIVE_CONFIG.filePath}:/content`;}
function refContentUrl(ref){return `https://graph.microsoft.com/v1.0/drives/${encodeURIComponent(ref.driveId)}/items/${encodeURIComponent(ref.itemId)}/content`;}
async function resolveFileRef(tok,force){
  if(_fileRef&&!force)return _fileRef;
  try{
    const res=await fetch("https://graph.microsoft.com/v1.0/me/drive/sharedWithMe",{headers:{Authorization:"Bearer "+tok}});
    if(!res.ok)return null;
    const body=await res.json();const items=(body&&Array.isArray(body.value))?body.value:[];
    for(const it of items){
      const ri=it.remoteItem||it;const name=(it.name||ri.name||"").toLowerCase();
      const driveId=ri.parentReference&&ri.parentReference.driveId;const itemId=ri.id;
      if(!driveId||!itemId)continue;
      if(name===_fileName){_fileRef={driveId,itemId};return _fileRef;}
      if(ri.folder){try{const ch=await fetch(`https://graph.microsoft.com/v1.0/drives/${encodeURIComponent(driveId)}/items/${encodeURIComponent(itemId)}/children`,{headers:{Authorization:"Bearer "+tok}});
        if(ch.ok){const kids=await ch.json();const hit=(kids.value||[]).find(k=>(k.name||"").toLowerCase()===_fileName);if(hit){_fileRef={driveId,itemId:hit.id};return _fileRef;}}}catch(_){}}
    }
  }catch(_){}
  return null;
}
function showSharedError(){_accessError=true;setSync("error","No shared-drive access");updateSyncBanner();}
function buildEnvelope(){return{_envelope:"corevrecruit",meta:{updated:new Date().toISOString(),by:currentUser||""},settings:S.settings,tombstones:S.tombstones||{},candidates:S.candidates||[]};}
function mergeArr(localArr,remoteArr,tombs){
  const m=new Map();(remoteArr||[]).forEach(r=>{if(r&&r.id)m.set(r.id,r);});
  (localArr||[]).forEach(l=>{if(!l||!l.id)return;const r=m.get(l.id);if(!r)m.set(l.id,l);else m.set(l.id,(l._ts||0)>=(r._ts||0)?l:r);});
  if(tombs){for(const id in tombs){const rec=m.get(id);if(rec&&(tombs[id]>=(rec._ts||0)))m.delete(id);}}
  return [...m.values()];
}
function mergeState(remote){
  if(!remote||typeof remote!=="object")return;
  const tombs=Object.assign({},S.tombstones||{});const rt=remote.tombstones||{};
  for(const id in rt){tombs[id]=Math.max(tombs[id]||0,rt[id]||0);}
  S.tombstones=tombs;
  COLLECTIONS.forEach(k=>{S[k]=mergeArr(S[k]||[],remote[k]||[],tombs);});
  if(remote.meta){lastUpdatedBy=remote.meta.by||lastUpdatedBy;if(remote.meta.updated)lastSyncAt=Date.parse(remote.meta.updated)||lastSyncAt;}
}
async function fetchRemote(tok){
  const ref=await resolveFileRef(tok);
  if(ref){
    let res=await fetch(refContentUrl(ref),{headers:{Authorization:"Bearer "+tok}});
    if(res.status===404){const fresh=await resolveFileRef(tok,true);if(fresh)res=await fetch(refContentUrl(fresh),{headers:{Authorization:"Bearer "+tok}});}
    if(res.status===404)return{status:404,ref};
    if(res.status===403){const e=new Error("403");e.code=403;throw e;}
    if(!res.ok)throw new Error("HTTP "+res.status);
    return{status:200,ref,data:await res.json()};
  }
  const res=await fetch(driveRootUrl(),{headers:{Authorization:"Bearer "+tok}});
  if(res.status===404)return{status:404};
  if(res.status===403){const e=new Error("403");e.code=403;throw e;}
  if(!res.ok)throw new Error("HTTP "+res.status);
  return{status:200,data:await res.json()};
}
async function downloadFromOneDrive(){
  if(!msalAccount)return;
  setSync("syncing","Loading…");
  try{
    const tok=await getAccessToken();
    const r=await fetchRemote(tok);
    if(r.status===404){await uploadToOneDrive();return;}
    if(r.data&&r.data._envelope){mergeState(r.data);saveLocal();}
    _accessError=false;updateSyncBanner();setSync("connected",syncedText());
  }catch(e){if(e&&e.code===403){showSharedError();return;}setSync("error","Sync error (using local copy)");}
}
async function uploadToOneDrive(){
  if(!msalAccount)return;
  if(_uploadInFlight){_uploadQueued=true;return;}
  _uploadInFlight=true;setSync("syncing","Saving…");
  try{
    const tok=await getAccessToken();
    try{const r=await fetchRemote(tok);if(r.status===200&&r.data&&r.data._envelope){mergeState(r.data);saveLocal();}}
    catch(me){if(me&&me.code===403){showSharedError();return;}}
    const ref=_fileRef||await resolveFileRef(tok);
    const putUrl=ref?refContentUrl(ref):driveRootUrl();
    let res=await fetch(putUrl,{method:"PUT",headers:{Authorization:"Bearer "+tok,"Content-Type":"application/json"},body:JSON.stringify(buildEnvelope())});
    if(res.status===403){showSharedError();return;}
    if(res.status===404&&ref){_fileRef=null;res=await fetch(driveRootUrl(),{method:"PUT",headers:{Authorization:"Bearer "+tok,"Content-Type":"application/json"},body:JSON.stringify(buildEnvelope())});if(res.status===403){showSharedError();return;}}
    if(!res.ok&&res.status!==201)throw new Error("HTTP "+res.status);
    _accessError=false;updateSyncBanner();lastSyncAt=Date.now();lastUpdatedBy=currentUser||lastUpdatedBy;setSync("connected",syncedText());
  }catch(e){setSync("error","Sync error");}
  finally{_uploadInFlight=false;if(_uploadQueued){_uploadQueued=false;scheduleSync();}}
}
function startPolling(){setInterval(async()=>{
  if(!msalAccount||_uploadInFlight)return;
  try{const tok=await getAccessToken();const r=await fetchRemote(tok);
    if(r.status===200&&r.data&&r.data._envelope){mergeState(r.data);saveLocal();}
    render();_accessError=false;updateSyncBanner();setSync("connected",syncedText());}catch(_){}
},15000);}
function manualSync(){downloadFromOneDrive().then(render);}

async function sendMail(to,subject,body){

    const res=await fetch("https://graph.microsoft.com/v1.0/me/sendMail",{method:"POST",headers:{Authorization:"Bearer "+tok,"Content-Type":"application/json"},body:JSON.stringify({message:{subject,body:{contentType:"Text",content:body},toRecipients:(Array.isArray(to)?to:[to]).map(a=>({emailAddress:{address:a}}))},saveToSentItems:true})});
    return res.ok;}catch(_){return false;}
}
async function notifyNewCandidates(cands){
  if(!cands.length)return;

    return "• "+(c.form&&c.form.name||"Unknown")+" — "+(c.form&&c.form.city||"?")+" — score "+(t==null?"unscored":t+"/100 ("+bandOf(t).name+")")+" — "+(c.form&&c.form.email||"")+" / "+(c.form&&c.form.phone||"");});
  const ok=await sendMail(NOTIFY_TO,"[Recruiting] "+cands.length+" new candidate"+(cands.length>1?"s":"")+" added",
    "New candidates added to the CoreV recruiting pipeline by "+currentUser+":\n\n"+lines.join("\n")+"\n\nOpen the recruiting portal for full details, AI assessments and interview questions.");

  flash("Scoring with AI…");
  const f=c.form||{};
  const prompt=`You are an expert sales recruiter screening applicants for a "Sales Development Coach" role at Core Velocity (UAE reseller of OxeFit AI fitness equipment). HUNTER sales role first, fitness coach second. Score strictly. Evaluate only on skills, experience, and role fit; never on nationality, gender, age, or other personal characteristics.
Score 0-10: outbound (cold calling evidence), conversion (marketing-lead conversion), fitness (S&C credibility), industry (sports/fitness equipment distribution), market (UAE fit, languages as job-relevant skill, travel), drive.
APPLICATION: Name ${f.name||""} | City ${f.city||""} | Languages ${f.languages||""} | Salary ${f.salary||""} | Sales exp ${f.years_sales||""} | Daily calls ${f.daily_calls||""} | Conversion ${f.conversion||""} | Targets ${f.targets||""} | Sports distribution ${f.sports_dist||""} ${f.sports_dist_companies||""} | Fitness ${f.fitness_bg||""} | Certs ${f.certs||""}
CV: """${(c.cvExtract||"").slice(0,7000)}"""
Respond ONLY with JSON: {"scores":{"outbound":n,"conversion":n,"fitness":n,"industry":n,"market":n,"drive":n},"summary":"2-3 sentences","strengths":["..."],"red_flags":["..."],"interview_questions":["3-4 tailored"]}`;
  try{
    const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,messages:[{role:"user",content:prompt}]})});
    const d=await r.json();
    const text=(d.content||[]).map(b=>b.text||"").join("\n").replace(/```json|```/g,"").trim();
    c.evaluation=JSON.parse(text.slice(text.indexOf("{"),text.lastIndexOf("}")+1));
    c._ts=Date.now();dbSet();render();flash("Scored");
  }catch(e){flash("AI scoring failed — check the API key");}
}

/* ---- Excel export ---- */
function exportExcel(){
  const city=$("#cityFilter").value;
  let list=(S.candidates||[]).filter(c=>city==="All cities"||((c.form&&c.form.city)||"").startsWith(city==="Either"?"Either":city));
  list.sort((a,b)=>{const ta=a.evaluation&&a.evaluation.scores?totalFor(a.evaluation.scores):-1;const tb=b.evaluation&&b.evaluation.scores?totalFor(b.evaluation.scores):-1;return tb-ta;});
  if(!list.length){flash("Nothing to export");return;}
  const rows=list.map((c,i)=>{const f=c.form||{};const s=(c.evaluation&&c.evaluation.scores)||{};const t=c.evaluation&&c.evaluation.scores?totalFor(s):"";
    return{Rank:i+1,Name:f.name||"",Email:f.email||"",Phone:f.phone||"",City:f.city||"","Expected Salary (AED)":f.salary||"",
      Nationality:f.nationality||"",Languages:f.languages||"","Visa Status":f.visa||"",Travel:f.travel||"",
      "Years Sales":f.years_sales||"","Daily Calls":f.daily_calls||"","Conversion Rate":f.conversion||"",
      "Sports Distribution":f.sports_dist||"","Distribution Companies":f.sports_dist_companies||"",Certifications:f.certs||"",
      "Cold Calls (30%)":s.outbound??"","Conversion (25%)":s.conversion??"","Fitness (20%)":s.fitness??"",
      "Industry (10%)":s.industry??"","Market (10%)":s.market??"","Drive (5%)":s.drive??"",
      "Total /100":t,Band:t===""?"Unscored":bandOf(t).name,"AI Summary":(c.evaluation&&c.evaluation.summary)||"",
      "Red Flags":((c.evaluation&&c.evaluation.red_flags)||[]).join("; "),
      Submitted:c.submittedAt?new Date(c.submittedAt).toLocaleString():"","CV File":c.cvFileName||"",Source:c.source||"portal"};});
  const ws=XLSX.utils.json_to_sheet(rows);const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,"Candidates");
  XLSX.writeFile(wb,"CoreV_Candidate_Pipeline.xlsx");
}
